<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFD939" />
    <meta name="color-scheme" content="light dark" />
    <title>Burger Rox - Crave-Worthy Burgers | Affordable Fast Food Delivery in Pune</title>
    <meta name="description" content="Burger Rox serves affordable, delicious burgers in Pune. Starting at ₹79 with 30-min delivery. Order via WhatsApp. Student discounts available!" />
    <link rel="canonical" href="https://burgerrox.in/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Burger Rox" />
    <meta name="keywords" content="burgers, fast food, Pune, affordable food, student meals, delivery, WhatsApp order" />
    
    <!-- Preconnect for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://awards.infcdn.net" />
    <link rel="preconnect" href="https://awards.infcdn.net" crossorigin />
    
    <!-- Preload hero image for faster LCP/FCP -->
    <link rel="preload" as="image" href="/hero-burger.webp" type="image/webp" fetchpriority="high" />
    
    <!-- Critical CSS inline for faster FCP -->
    <style>
      body{margin:0;font-family:system-ui,-apple-system,sans-serif}
      #root{min-height:100vh}
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
      .hero-placeholder{position:relative;min-height:80vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#1a1a1a}
      .hero-placeholder img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
      .hero-placeholder .overlay{position:absolute;inset:0;background:rgba(255,217,57,0.4)}
      .hero-placeholder .content{position:relative;z-index:10;text-align:center;padding:1rem;color:#fff}
      .hero-placeholder h1{font-family:'Bebas Neue',system-ui,sans-serif;font-size:clamp(4rem,10vw,8rem);line-height:1;letter-spacing:0.05em;font-weight:700;text-shadow:0 2px 4px rgba(0,0,0,0.3);margin:0}
    </style>
    
    <!-- Fonts with display=swap for better CLS -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&family=Allura&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&family=Allura&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&family=Allura&display=swap" rel="stylesheet" /></noscript>

    <!-- Preload critical fonts for LCP -->
    <link rel="preload" href="https://fonts.gstatic.com/s/bebasneue/v14/JTUSjIg69CK48gW7PXooxW5rygbi49c.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Burger Rox - Affordable Burgers in Pune" />
    <meta property="og:description" content="Crave-worthy burgers starting at ₹79. Fast 30-min delivery. Order on WhatsApp!" />
    <meta property="og:type" content="restaurant" />
    <meta property="og:url" content="https://burgerrox.in/" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="Burger Rox" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Burger Rox - Affordable Burgers in Pune" />
    <meta name="twitter:description" content="Crave-worthy burgers starting at ₹79. Fast delivery!" />
    
    <!-- Restaurant Guru Badge CSS - loaded async -->
    <link rel="preload" href="https://awards.infcdn.net/2024/badge-circledLeaves27.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://awards.infcdn.net/2024/badge-circledLeaves27.css" rel="stylesheet" /></noscript>

    <!-- Structured Data for Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Burger Rox",
      "image": "https://burgerrox.in/hero-burger.jpg",
      "url": "https://burgerrox.in",
      "telephone": "+919970078688",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Urban Forest, Mamurdi",
        "addressLocality": "Pune",
        "postalCode": "412101",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 18.6298,
        "longitude": 73.8131
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Saturday", "Sunday"],
          "opens": "11:00",
          "closes": "21:30"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Friday",
          "opens": "16:00",
          "closes": "21:30"
        }
      ],
      "servesCuisine": "American",
      "priceRange": "₹79-₹499",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.6",
        "reviewCount": "500"
      },
      "sameAs": [
        "https://www.instagram.com/burgerroxx",
        "https://www.facebook.com/burgerroxx/"
      ]
    }
    </script>
  </head>

  <body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;" onfocus="this.style.position='static';this.style.width='auto';this.style.height='auto';">Skip to main content</a>
    <div id="root">
      <!-- Static hero placeholder for instant FCP/LCP - replaced by React on mount -->
      <div class="hero-placeholder" aria-hidden="true">
        <picture>
          <source type="image/webp" srcset="/hero-burger-mobile.webp 768w, /hero-burger.webp 1920w" sizes="100vw" />
          <img src="/hero-burger.jpg" alt="" width="1920" height="1080" fetchpriority="high" decoding="async" />
        </picture>
        <div class="overlay"></div>
        <div class="content">
          <h1>CRAVE-WORTHY BURGERS</h1>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
